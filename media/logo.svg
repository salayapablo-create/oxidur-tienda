<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="ringCut">
      <rect width="100" height="100" fill="white"/>
      <!-- La gota corta el anillo -->
      <path d="M 60 26 L 80 50 L 60 74 L 40 50 Z" fill="black" transform="rotate(-30 50 50)"/>
    </mask>
  </defs>
  <!-- Anillo (círculo grueso) cortado por la gota -->
  <circle cx="50" cy="50" r="35" stroke="currentColor" stroke-width="11" fill="none" mask="url(#ringCut)"/>
  <!-- Gota maciza tipo diamante alargado -->
  <path d="M 60 26 L 78 50 L 60 74 L 42 50 Z" fill="currentColor" transform="rotate(-30 50 50)"/>
</svg>
